<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber SaaS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="moldura">
        <section class="aplicacao" aria-label="Tela principal da barbearia">
            <header class="topo">
                <div class="topo__logo">
                    <img src="ChatGPT%20Image%202%20de%20abr.%20de%202026%2C%2013_29_20%202.png" alt="Logo Barber">
                </div>

                <p class="topo__voltar">Voltar</p>

                <div class="topo__usuario">
                    <svg viewBox="0 0 48 48" aria-hidden="true">
                        <circle cx="24" cy="24" r="17"></circle>
                        <circle cx="24" cy="18" r="5"></circle>
                        <path d="M15 33c2.5-4.8 7-7.2 9-7.2s6.5 2.4 9 7.2"></path>
                    </svg>
                    <span>User123</span>
                </div>
            </header>

            <section class="atalhos" aria-label="Opcoes principais">
                <figure class="atalho atalho--novo">
                    <img src="Bot%C3%A3o%20Novo%20Agendamento.png" alt="Novo Agendamento">
                </figure>

                <figure class="atalho atalho--agenda">
                    <img src="Bot%C3%A3o%20Minha%20Agenda.png" alt="Minha Agenda">
                </figure>
            </section>
        </section>
    </div>
</body>
</html>
